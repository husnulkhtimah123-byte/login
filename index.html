<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Daftar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <input type="radio" id="login-tab" name="tab" checked>
    <input type="radio" id="register-tab" name="tab">

    <div class="tabs">
        <label for="login-tab">Login</label>
        <label for="register-tab">Daftar</label>
    </div>

    
    <div class="form-box login">
        <h2>Selamat Datang</h2>
        <p>Silakan masuk ke akun Anda</p>

        <form action="home.html">
            <input type="text" name="username" placeholder="Email atau Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Masuk</button>
        </form>
    </div>

    
    <div class="form-box register">
        <h2>Buat Akun</h2>
        <p>Daftar untuk melanjutkan</p>

        <form action="home.html">
            <input type="text" name="username" placeholder="Username" required>

            <input type="email" name="email" placeholder="Email" required>

            <input type="password" name="password" placeholder="Password" required>

            <input type="password" name="confirm_password" placeholder="Konfirmasi Password" required>

            <button type="submit">Daftar</button>
        </form>
    </div>

</div>

</body>
</html>
